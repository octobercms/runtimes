name: Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/octobercms
  MOVING_TAG: php85
  GIT_REF: ${{ github.event.release.tag_name || github.ref_name }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        include:
          - image: runtime-base
            dockerfile: images/base/Dockerfile
          - image: runtime-dev
            dockerfile: images/dev/Dockerfile
          - image: runtime-prod
            dockerfile: images/prod/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        env:
          IMAGE: ${{ matrix.image }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          MOVING_TAG: ${{ env.MOVING_TAG }}
          GIT_REF: ${{ env.GIT_REF }}
        run: bash .github/scripts/prepare-image-tags.sh

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/runtime-base:${{ env.MOVING_TAG }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
