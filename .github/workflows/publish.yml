name: Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/octobercms
  MOVING_TAG: php85

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          MOVING_TAG: ${{ env.MOVING_TAG }}
        run: |
          date=$(date -u +'%Y.%m.%d')
          sha="${GITHUB_SHA:0:7}"
          version=""

          case "${{ github.event_name }}" in
            release)
              ref="${{ github.event.release.tag_name }}"
              ;;
            push)
              ref="${{ github.ref_name }}"
              ;;
            *)
              ref=""
              ;;
          esac

          if [[ "${ref}" == v* ]]; then
            version="${ref#v}"
          fi

          write_tags() {
            local image=$1
            local prefix="${IMAGE_PREFIX}/${image}"

            echo "${prefix}:${MOVING_TAG}"
            echo "${prefix}:latest"
            echo "${prefix}:${MOVING_TAG}-${date}"
            echo "${prefix}:${MOVING_TAG}-${date}-${sha}"

            if [[ -n "${version}" ]]; then
              echo "${prefix}:${MOVING_TAG}-${version}"
              echo "${prefix}:${version}"
            fi
          }

          write_image_tags() {
            local output_name=$1
            local image=$2

            {
              echo "${output_name}<<EOF"
              write_tags "${image}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          write_image_tags base_tags runtime-base
          write_image_tags dev_tags runtime-dev
          write_image_tags prod_tags runtime-prod

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.base_tags }}
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/dev/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/runtime-base:${{ env.MOVING_TAG }}
          tags: ${{ steps.meta.outputs.dev_tags }}
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push prod image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/prod/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/runtime-base:${{ env.MOVING_TAG }}
          tags: ${{ steps.meta.outputs.prod_tags }}
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
